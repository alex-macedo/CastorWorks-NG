# CastorWorks Evolution API - Nginx Reverse Proxy Configuration
#
# This configuration file sets up the reverse proxy for whatsapp.castorworks.cloud
#
# Installation:
#   1. Copy to server: /etc/nginx/sites-available/whatsapp.castorworks.cloud
#   2. Create symlink: ln -s /etc/nginx/sites-available/whatsapp.castorworks.cloud /etc/nginx/sites-enabled/
#   3. Obtain SSL certificate: certbot certonly --nginx -d whatsapp.castorworks.cloud
#   4. Test config: nginx -t
#   5. Reload nginx: systemctl reload nginx
#
# See docs/plans/castorworks-whatsapp-evolutionapi.md for full documentation

# HTTPS Server Block - WhatsApp Evolution API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name whatsapp.castorworks.cloud;

    # SSL Certificate Configuration
    # Update paths if using different certificate location
    ssl_certificate /etc/letsencrypt/live/castorworks.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/castorworks.cloud/privkey.pem;
    
    # SSL Settings (modern configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/whatsapp.castorworks.cloud.access.log;
    error_log /var/log/nginx/whatsapp.castorworks.cloud.error.log;

    # Main location - Proxy to Evolution API
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        
        # WebSocket support (required for real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts for long-running connections (WebSocket)
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
        
        # Client body size (for media uploads)
        client_max_body_size 50M;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache health checks
        proxy_cache_valid 200 5s;
    }

    # Manager UI (if enabled)
    location /manager {
        proxy_pass http://127.0.0.1:8080/manager;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Basic auth for manager (optional - uncomment if needed)
        # auth_basic "Evolution API Manager";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # Swagger documentation
    location /docs {
        proxy_pass http://127.0.0.1:8080/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name whatsapp.castorworks.cloud;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}
