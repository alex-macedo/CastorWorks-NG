# Deno edge-function lint is now part of the main CI workflow (ci.yml, job: deno).
# This file is kept as a placeholder for standalone Deno runs if needed.

name: Deno

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run linter
        run: cd supabase/functions && deno lint
