# =============================================================================
# CastorWorks-NG Deploy Workflow
# =============================================================================
# Builds and deploys the NG bundle to production (app.castorworks.cloud).
# Paths: /var/www/castorworks-ng/dist
# Secrets required: PROD_SSH_PRIVATE_KEY, PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_PORT,
#                   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# =============================================================================

name: Deploy to Production (app)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  DEPLOY_PATH: /var/www/castorworks-ng/dist

jobs:
  # ============================================
  # JOB 1: Lint & Test
  # ============================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        # Tests use mocks, not real Supabase. TZ set for consistent date calculations.
        env:
          TZ: America/New_York
          SKIP_TRANSLATION_COVERAGE: 'true'
        run: npm run test:run

  # ============================================
  # JOB 2: Build & Deploy
  # ============================================
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    environment:
      name: production
      url: https://app.castorworks.cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Generate build info
        run: |
          BUILD_ID="${GITHUB_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "BUILD_ID=${BUILD_ID}" > dist/BUILD_INFO
          echo "COMMIT=${GITHUB_SHA}" >> dist/BUILD_INFO
          echo "TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/BUILD_INFO

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Create backup on server
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" \
            "${SSH_USER}@${SSH_HOST}" \
            'mkdir -p /var/www/castorworks-ng-backups /var/www/castorworks-ng/dist
             if [ -n "$(ls -A /var/www/castorworks-ng/dist 2>/dev/null)" ]; then
               cp -r /var/www/castorworks-ng/dist \
                 "/var/www/castorworks-ng-backups/backup_$(date +%Y%m%d_%H%M%S)"
             fi
             ls -t /var/www/castorworks-ng-backups | tail -n +11 | \
               xargs -I {} rm -rf "/var/www/castorworks-ng-backups/{}"'

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT:-22}" \
            dist/ \
            "${SSH_USER}@${SSH_HOST}:/var/www/castorworks-ng/dist/"

      - name: Set permissions
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" \
            "${SSH_USER}@${SSH_HOST}" \
            'chown -R www-data:www-data /var/www/castorworks-ng
             chmod -R 755 /var/www/castorworks-ng
             find /var/www/castorworks-ng -type f -exec chmod 644 {} \;'

      - name: Reload nginx
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" \
            "${SSH_USER}@${SSH_HOST}" \
            'nginx -t && systemctl reload nginx'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ============================================
  # JOB 3: Validate Deployment
  # ============================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Wait for propagation
        run: sleep 10

      - name: Check app.castorworks.cloud
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 3 --retry-delay 5 \
            https://app.castorworks.cloud)
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "ERROR: app.castorworks.cloud returned ${HTTP_CODE}"
            exit 1
          fi
          echo "app.castorworks.cloud is up (HTTP ${HTTP_CODE})"
