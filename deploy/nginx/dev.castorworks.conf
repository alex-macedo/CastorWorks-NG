# CastorWorks (original) Development Domain - Production Static Build
#
# Serves the static build on dev.castorworks.cloud and proxies Supabase API
# to the original CastorWorks Kong (port 8000). For NG use devng.castorworks.cloud.
#
# INSTALLATION on server:
# 1. Replace: /etc/nginx/sites-available/dev.castorworks.conf
# 2. Test:    nginx -t
# 3. Reload:  systemctl reload nginx
#
# NOTE: The $connection_upgrade variable is defined in /etc/nginx/nginx.conf

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name dev.castorworks.cloud;

    location / {
        return 308 https://$host$request_uri;
    }
}

# Main HTTPS server block
server {
    listen 443 ssl;
    server_name dev.castorworks.cloud;
    client_max_body_size 50m;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/dev.castorworks.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.castorworks.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root directory - points to the production build
    root /var/www/castorworks/dist;
    index index.html;

    # Logging
    access_log /var/log/nginx/dev.castorworks.access.log;
    error_log /var/log/nginx/dev.castorworks.error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Debug-Host $hostname always;
    add_header X-Debug-Server $server_name always;

    # ============================================
    # SUPABASE API PROXY (original CastorWorks Kong on localhost:8000)
    # ============================================
    
    # Supabase Realtime WebSocket
    location ^~ /realtime/v1/websocket {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Supabase REST API
    location ^~ /rest/v1/ {
        add_header X-Debug-Source "Supabase-Rest-Proxy" always;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase Auth API
    location ^~ /auth/v1/ {
        add_header X-Debug-Source "Supabase-Auth-Proxy" always;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase Storage API
    # CRITICAL: Use ^~ to prevent regex locations from intercepting storage calls (e.g. .png files)
    location ^~ /storage/v1/ {
        add_header X-Debug-Source "Supabase-Storage-Proxy" always;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase Edge Functions
    location ^~ /functions/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Edge functions may take longer
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Supabase Realtime API (non-WebSocket)
    location ^~ /realtime/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service worker - never cache
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # ============================================
    # STATIC ASSETS - Aggressive caching
    # ============================================
    
    # JavaScript and CSS bundles (hashed filenames)
    location /assets/ {
        add_header X-Debug-Source "Assets-Static" always;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ============================================
    # SPA FALLBACK - All other routes
    # ============================================
    
    location / {
        add_header X-Debug-Match "Catch-All" always;
        # Try static file first, then fallback to index.html for SPA routing
        try_files $uri $uri/ /index.html;
    }

    # index.html - never cache
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ============================================
    # SECURITY - Block sensitive files
    # ============================================
    
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
