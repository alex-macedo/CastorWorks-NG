# =============================================================================
# Dependabot Auto-Label Workflow
# =============================================================================
# Automatically labels Dependabot PRs based on semver update type
# Only patch updates get the 'automerge' label by default
# =============================================================================

name: Dependabot - Label PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-dependabot-pr:
    name: Label Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Label patch updates for auto-merge
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr edit "$PR_URL" --add-label "automerge"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label security updates for auto-merge
        if: steps.metadata.outputs.security-advisories != ''
        run: gh pr edit "$PR_URL" --add-label "automerge"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add informational labels
        run: |
          # Add ecosystem label
          gh pr edit "$PR_URL" --add-label "dependencies"

          # Add update-type label for visibility
          case "$UPDATE_TYPE" in
            version-update:semver-major)
              gh pr edit "$PR_URL" --add-label "semver-major"
              ;;
            version-update:semver-minor)
              gh pr edit "$PR_URL" --add-label "semver-minor"
              ;;
            version-update:semver-patch)
              gh pr edit "$PR_URL" --add-label "semver-patch"
              ;;
          esac
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: |
          gh pr comment "$PR_URL" --body "✅ This is a **patch update** and has been labeled for auto-merge after required checks pass.

          **To opt-out:** Remove the \`automerge\` label from this PR.

          **Update details:**
          - Dependency: \`${{ steps.metadata.outputs.dependency-names }}\`
          - Update type: \`${{ steps.metadata.outputs.update-type }}\`
          - Previous version: \`${{ steps.metadata.outputs.previous-version }}\`
          - New version: \`${{ steps.metadata.outputs.new-version }}\`"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on security updates
        if: steps.metadata.outputs.security-advisories != ''
        run: |
          gh pr comment "$PR_URL" --body "🔒 This is a **security update** and has been labeled for auto-merge after required checks pass.

          **To opt-out:** Remove the \`automerge\` label from this PR.

          **Security advisories:** \`${{ steps.metadata.outputs.security-advisories }}\`

          **Update details:**
          - Dependency: \`${{ steps.metadata.outputs.dependency-names }}\`
          - Update type: \`${{ steps.metadata.outputs.update-type }}\`
          - Previous version: \`${{ steps.metadata.outputs.previous-version }}\`
          - New version: \`${{ steps.metadata.outputs.new-version }}\`"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on non-patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-patch' && steps.metadata.outputs.security-advisories == ''
        run: |
          gh pr comment "$PR_URL" --body "ℹ️ This is a **${{ steps.metadata.outputs.update-type }}** and will NOT be auto-merged.

          Please review and merge manually if appropriate.

          **Update details:**
          - Dependency: \`${{ steps.metadata.outputs.dependency-names }}\`
          - Update type: \`${{ steps.metadata.outputs.update-type }}\`
          - Previous version: \`${{ steps.metadata.outputs.previous-version }}\`
          - New version: \`${{ steps.metadata.outputs.new-version }}\`"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}