name: Lint Hooks

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:
  lint-hooks:
    name: ESLint React Hooks Import Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run hooks lint
        run: npm run lint:hooks
