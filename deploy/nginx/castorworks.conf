# CastorWorks Production Nginx Configuration
# 
# This configuration serves the static production build of CastorWorks
# and proxies Supabase API requests to the Kong gateway.
#
# INSTALLATION on server:
# 1. Copy to: /etc/nginx/sites-available/castorworks.conf
# 2. Enable:  ln -sf /etc/nginx/sites-available/castorworks.conf /etc/nginx/sites-enabled/
# 3. Test:    nginx -t
# 4. Reload:  systemctl reload nginx
#
# NOTE: This replaces the current dev server proxy with static file serving.
# The $connection_upgrade variable is defined in /etc/nginx/nginx.conf

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name castorworks.cloud www.castorworks.cloud;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

# Main HTTPS server block - Production static files
server {
    listen 443 ssl;
    server_name castorworks.cloud www.castorworks.cloud;
    client_max_body_size 50m;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/castorworks.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/castorworks.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root directory - points to the production build
    root /var/www/castorworks/dist;
    index index.html;

    # Logging
    access_log /var/log/nginx/castorworks.access.log;
    error_log /var/log/nginx/castorworks.error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Debug-Host $hostname always;
    add_header X-Debug-Server $server_name always;

    # ============================================
    # SUPABASE API PROXY (to Kong on localhost:8000)
    # ============================================
    
    # Supabase Realtime WebSocket
    location ^~ /realtime/v1/websocket {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Supabase REST API
    location ^~ /rest/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase Auth API
    location ^~ /auth/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase Storage API
    # CRITICAL: Use ^~ to prevent regex locations from intercepting storage calls (e.g. .png files)
    location ^~ /storage/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase Edge Functions
    location ^~ /functions/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Edge functions may take longer
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # OLLAMA Remote AI (Hostinger VPS) - Internal-only access for Edge Functions
    # This proxy is restricted to localhost connections only for security.
    # Upstream is a dedicated AI VPS: 148.230.83.71
    location ^~ /ollama/v1/ {
        # Only allow from localhost (Edge Functions server)
        allow 127.0.0.1;
        deny all;

        proxy_pass http://148.230.83.71:11434/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for LLM inference (can be slow)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # Supabase Realtime API (non-WebSocket)
    location ^~ /realtime/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service worker - never cache
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # ============================================
    # STATIC ASSETS - Aggressive caching
    # ============================================
    
    # JavaScript and CSS bundles (hashed filenames)
    location /assets/ {
        add_header X-Debug-Source "Assets-Static" always;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ============================================
    # SPA FALLBACK - All other routes
    # ============================================
    
    location / {
        add_header X-Debug-Match "Catch-All" always;
        # Try static file first, then fallback to index.html for SPA routing
        try_files $uri $uri/ /index.html;
    }

    # index.html - never cache (allows updates to propagate)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ============================================
    # SECURITY - Block sensitive files
    # ============================================
    
    # Block access to hidden files (except .well-known)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
