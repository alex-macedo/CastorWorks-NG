# =============================================================================
# CastorWorks-NG CI Workflow
# =============================================================================
# Runs on pull requests and non-main pushes to validate code quality.
# Uses npm (NG uses package-lock.json, not bun).
# =============================================================================

name: CI - Lint, Test, Build

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]  # Don't duplicate with deploy workflow

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # JOB 1: Lint Code
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Validate JSON files
        run: npm run validate:json

      - name: Validate daily changelog file
        run: npm run changelog:check

  # ============================================
  # JOB 2: Run Tests
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        env:
          TZ: America/New_York
          SKIP_TRANSLATION_COVERAGE: 'true'
        run: npm run test:run

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always() && env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ============================================
  # JOB 3: Build Production Bundle
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: Build failed - index.html not found"
            exit 1
          fi
          echo "Build successful - $(find dist -type f | wc -l) files generated"

  # ============================================
  # JOB 4: Deno Lint (Edge Functions)
  # ============================================
  deno:
    name: Deno Lint
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint edge functions
        run: cd supabase/functions && deno lint

  # ============================================
  # JOB 5: Security Audit
  # ============================================
  security:
    name: Security Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run security tests
        run: npm run test:security || echo "Security tests not configured"
        continue-on-error: true

  # ============================================
  # JOB 6: Cleanup Old CI Artifacts
  # ============================================
  cleanup:
    name: Cleanup Old CI Artifacts
    runs-on: ubuntu-latest
    needs: [build, security]
    if: always()
    steps:
      - name: Delete old CI artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: ci-build-*
          failOnError: false
          deleteExpiredArtifacts: true
