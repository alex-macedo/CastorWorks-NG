# =============================================================================
# CastorWorks CI Workflow
# =============================================================================
# Runs on pull requests to validate code quality before merging
# =============================================================================

name: CI - Lint, Test, Build

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]  # Don't duplicate with deploy workflow

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # JOB 1: Lint Code
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: npm run lint

      - name: Validate JSON files
        run: npm run validate:json

      - name: Validate daily changelog file
        run: npm run changelog:check

  # ============================================
  # JOB 2: Run Tests
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: npm run test:run

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always() && env.CODECOV_TOKEN != ''
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ============================================
  # JOB 3: Build Production Bundle
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build production bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: Build failed - index.html not found"
            exit 1
          fi
          echo "Build successful - $(find dist -type f | wc -l) files generated"

      - name: Create optimized artifact
        run: |
          # Create minimal CI artifact for verification
          mkdir -p ci-artifact
          
          # Copy only essential files for CI verification
          cp -r dist/assets ci-artifact/
          cp dist/index.html ci-artifact/
          
          # Create CI verification manifest
          echo "Commit: ${{ github.sha }}" > ci-artifact/CI_MANIFEST.txt
          echo "Files: $(find ci-artifact -type f | wc -l)" >> ci-artifact/CI_MANIFEST.txt
          echo "Size: $(du -sh ci-artifact | cut -f1)" >> ci-artifact/CI_MANIFEST.txt
          
          # Show optimization results
          echo "Original dist size: $(du -sh dist | cut -f1)"
          echo "CI artifact size: $(du -sh ci-artifact | cut -f1)"

      # - name: Upload optimized CI artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ci-build-${{ github.sha }}
      #     path: ci-artifact/
      #     retention-days: 1
      #     compression-level: 9

  # ============================================
  # JOB 4: Security Audit
  # ============================================
  security:
    name: Security Check
    runs-on: ubuntu-latest
    needs: lint
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run security tests
        run: npm run test:security || echo "Security tests not configured"
        continue-on-error: true

  # ============================================
  # JOB 5: Cleanup Old CI Artifacts
  # ============================================
  cleanup:
    name: Cleanup Old CI Artifacts
    runs-on: ubuntu-latest
    needs: [build, security]
    if: always()
    steps:
      - name: Delete old CI artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: ci-build-*
          failOnError: false
          deleteExpiredArtifacts: true
