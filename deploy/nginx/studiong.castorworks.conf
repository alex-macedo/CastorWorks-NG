# CastorWorks-NG Supabase Studio - studiong.castorworks.cloud
#
# Proxies to the NG Studio container (port 54325 on host; container exposes 3000).
# Clear separation from any other Studio; use only for NG backend.
#
# PREREQUISITE: Obtain SSL cert: certbot certonly --nginx -d studiong.castorworks.cloud
# INSTALLATION on server:
# 1. Copy: deploy/nginx/studiong.castorworks.conf → /etc/nginx/sites-available/
# 2. Enable: ln -sf /etc/nginx/sites-available/studiong.castorworks.conf /etc/nginx/sites-enabled/
# 3. Test: nginx -t && systemctl reload nginx

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name studiong.castorworks.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

# HTTPS - proxy to NG Studio
server {
    listen 443 ssl;
    server_name studiong.castorworks.cloud;
    client_max_body_size 50m;

    ssl_certificate /etc/letsencrypt/live/studiong.castorworks.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studiong.castorworks.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/studiong.castorworks.access.log;
    error_log /var/log/nginx/studiong.castorworks.error.log;

    location / {
        proxy_pass http://127.0.0.1:54325;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
