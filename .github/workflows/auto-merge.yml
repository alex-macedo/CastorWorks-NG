# =============================================================================
# Auto-merge Labeled PRs
# =============================================================================
# Automatically merges PRs labeled with 'automerge' after required checks pass
# Respects branch protection rules and only merges when all conditions are met
# =============================================================================

name: Auto-merge Labeled PRs

on:
  pull_request_target:
    types: [labeled, ready_for_review]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI - Lint, Test, Build"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge labeled PR
    runs-on: ubuntu-latest
    # Only run on PRs with automerge label
    if: |
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'automerge')) ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Get PR number from check suite
        if: github.event_name == 'check_suite' || github.event_name == 'workflow_run'
        id: get-pr
        run: |
          if [ "${{ github.event_name }}" = "check_suite" ]; then
            PR_NUMBER=$(gh api "/repos/${{ github.repository }}/commits/${{ github.event.check_suite.head_sha }}/pulls" --jq '.[0].number')
          else
            PR_NUMBER=$(gh api "/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" --jq '.[0].number')
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if PR has automerge label
        if: github.event_name == 'check_suite' || github.event_name == 'workflow_run'
        id: check-label
        run: |
          PR_NUMBER="${{ steps.get-pr.outputs.pr_number }}"
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR found for this check, skipping"
            echo "has_label=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          HAS_LABEL=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' | grep -x "automerge" || echo "")
          if [ -n "$HAS_LABEL" ]; then
            echo "has_label=true" >> $GITHUB_OUTPUT
          else
            echo "has_label=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: |
          (github.event_name == 'pull_request_target') ||
          (steps.check-label.outputs.has_label == 'true')
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            PR_NUMBER="${{ steps.get-pr.outputs.pr_number }}"
          fi

          # Enable auto-merge with squash strategy
          gh pr merge "$PR_NUMBER" --auto --squash

          echo "✅ Auto-merge enabled for PR #$PR_NUMBER"
          echo "PR will be merged automatically once all required checks pass"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
