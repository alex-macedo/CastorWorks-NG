# =============================================================================
# Check Current Artifact Usage
# =============================================================================

name: Check Artifact Usage

on:
  workflow_dispatch:

jobs:
  check-usage:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Check current artifact usage
        uses: actions/github-script@v7
        with:
          script: |
            try {
              // Get artifacts
              const artifacts = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });
              
              console.log('=== CURRENT GITHUB ARTIFACT USAGE ===');
              console.log('Total artifacts:', artifacts.data.artifacts.length);
              
              const totalSize = artifacts.data.total_size_in_bytes / 1024 / 1024;
              console.log('Total storage used:', totalSize.toFixed(2), 'MB');
              console.log('Free tier limit: 2000MB');
              console.log('Available storage:', (2000 - totalSize).toFixed(2), 'MB');
              console.log('Usage percentage:', ((totalSize / 2000) * 100).toFixed(1) + '%');
              
              console.log('\n=== ARTIFACT BREAKDOWN ===');
              
              // Group by workflow type
              const productionArtifacts = artifacts.data.artifacts.filter(a => 
                a.name.includes('production-build')
              );
              const ciArtifacts = artifacts.data.artifacts.filter(a => 
                a.name.includes('ci-build')
              );
              const otherArtifacts = artifacts.data.artifacts.filter(a => 
                !a.name.includes('production-build') && !a.name.includes('ci-build')
              );
              
              console.log('Production artifacts:', productionArtifacts.length);
              console.log('CI artifacts:', ciArtifacts.length);
              console.log('Other artifacts:', otherArtifacts.length);
              
              // Show largest artifacts
              const sortedArtifacts = artifacts.data.artifacts
                .sort((a, b) => b.size_in_bytes - a.size_in_bytes)
                .slice(0, 10);
              
              console.log('\n=== TOP 10 LARGEST ARTIFACTS ===');
              sortedArtifacts.forEach((artifact, index) => {
                const size = artifact.size_in_bytes / 1024 / 1024;
                const age = Math.floor((Date.now() - new Date(artifact.created_at).getTime()) / (1000 * 60 * 60 * 24));
                console.log(`${index + 1}. ${artifact.name}: ${size.toFixed(2)}MB (${age} days old)`);
              });
              
              // Recommend action
              console.log('\n=== RECOMMENDATION ===');
              if (totalSize > 1900) {
                console.log('🚨 CRITICAL: Near storage limit - DELETE ALL ARTIFACTS');
                console.log('After deletion, CI should run normally with new optimized workflow');
              } else if (totalSize > 1500) {
                console.log('⚠️  WARNING: High usage - consider cleanup');
                console.log('CI may fail if you exceed 2000MB');
              } else {
                console.log('✅ OK: Storage usage is manageable');
              }
              
            } catch (error) {
              console.error('Error checking artifacts:', error.message);
            }